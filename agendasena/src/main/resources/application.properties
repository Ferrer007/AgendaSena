# ---------- Conexión a MySQL ----------
# createDatabaseIfNotExist=true crea la base automáticamente si no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/agendasena_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=Ferrercr$710
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# update: crea/actualiza tablas automáticamente según las entidades.
# Útil en desarrollo. Para producción se usaría "validate" + migraciones.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------- Carga de datos de prueba ----------
# Hibernate crea las tablas (ddl-auto=update) y LUEGO Spring ejecuta
# import.sql para insertar los datos de prueba.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ---------- Servidor ----------
server.port=8080